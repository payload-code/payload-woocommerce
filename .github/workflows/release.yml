name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Node dependencies (if any)
        run: |
          if [ -f package.json ]; then
            npm ci --prefer-offline --no-audit --no-fund
          fi

      - name: Build (if package.json contains build)
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi

      - name: Setup PHP + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Install Composer dependencies (if any)
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --no-interaction --prefer-dist --no-progress
          fi

      - name: Prepare ZIP artifact
        id: make_zip
        run: |
          OUTDIR=release
          mkdir -p "$OUTDIR"
          ZIPFILE="$OUTDIR/payload-woocommerce.zip"

          zip -r "$ZIPFILE" . \
            -x ".git/*" ".github/*" "release/*" "node_modules/*"

          echo "zip_path=$ZIPFILE" >> $GITHUB_OUTPUT

      - name: Upload ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.make_zip.outputs.zip_path }}" \
            --clobber
